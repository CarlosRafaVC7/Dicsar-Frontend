<aside class="sidebar" [class.collapsed]="!sidebarExpanded" [class.mobile-open]="sidebarExpanded && isMobile">
  <!-- BOTÓN DE TOGGLE -->
  <button class="sidebar-toggle" (click)="toggleSidebar()" [title]="sidebarExpanded ? 'Contraer sidebar' : 'Expandir sidebar'">
    <i class="fa-solid" [class.fa-chevron-left]="sidebarExpanded" [class.fa-chevron-right]="!sidebarExpanded"></i>
  </button>

  <!-- ENCABEZADO CON LOGO -->
  <div class="brand">
    <div class="brand-logo">
      <i class="fa-solid fa-clipboard-list"></i>
    </div>
    <div class="brand-info">
      <span class="brand-title">DICSAR</span>
      <span class="brand-subtitle">Sistema de Gestión</span>
    </div>
  </div>

  <!-- MENÚ PRINCIPAL -->
  <nav class="menu">
    <div *ngFor="let item of items" class="menu-group">
      
      <!-- Elemento del menú principal -->
      <div class="menu-item" 
           [class.has-submenu]="item.submenu"
           [class.expanded]="item.expanded"
           (click)="item.submenu ? toggleSubmenu(item) : null">
        
        <a *ngIf="!item.submenu" 
           [routerLink]="item.route"
           routerLinkActive="active"
           [routerLinkActiveOptions]="{ exact: true }"
           class="menu-link">
          <i [class]="item.icon + ' menu-icon'"></i>
          <span class="menu-label">{{ item.label }}</span>
          <span *ngIf="item.badge" class="menu-badge">{{ item.badge }}</span>
        </a>

        <div *ngIf="item.submenu" class="menu-link submenu-toggle">
          <i [class]="item.icon + ' menu-icon'"></i>
          <span class="menu-label">{{ item.label }}</span>
          <i class="fa-solid fa-chevron-down chevron-icon" 
             [class.rotated]="item.expanded"></i>
        </div>
      </div>

      <!-- Submenú - Visible tanto expandido como contraído -->
      <div *ngIf="item.submenu && (item.expanded || isCollapsed)" class="submenu">
        <a *ngFor="let subitem of item.submenu"
           [routerLink]="subitem.route"
           routerLinkActive="active"
           [routerLinkActiveOptions]="{ exact: true }"
           class="submenu-item">
          <i [class]="subitem.icon + ' submenu-icon'"></i>
          <span class="submenu-label">{{ subitem.label }}</span>
        </a>
      </div>

    </div>
  </nav>

  <!-- FOOTER CON USUARIO Y LOGOUT -->
  <div class="sidebar-footer">
    <div class="user-info">
      <div class="user-avatar">
        <i class="fa-solid fa-user"></i>
      </div>
      <div class="user-details">
        <span class="user-name">{{ currentUser?.nombreCompleto || 'Usuario' }}</span>
        <span class="user-role">{{ getRoleName() }}</span>
      </div>
    </div>
    <button class="btn-logout" (click)="logout()">
      <i class="fa-solid fa-right-from-bracket logout-icon"></i>
      <span class="logout-text">Cerrar Sesión</span>
    </button>
  </div>
</aside>
