<div class="not-found-container">
  <div class="not-found-content">
    <div class="illustration">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" class="error-svg">
        <circle cx="100" cy="100" r="90" fill="#eff6ff" class="bg-circle"/>
        <circle cx="100" cy="100" r="70" fill="#dbeafe" class="inner-circle"/>
        <text x="100" y="130" text-anchor="middle" class="error-code">404</text>
        <path d="M60 70 L90 100 L60 130" stroke="#f59e0b" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" class="arrow"/>
        <circle cx="140" cy="100" r="8" fill="#f59e0b" class="dot"/>
      </svg>
    </div>
    
    <h1 class="title">Página No Encontrada</h1>
    <p class="message">
      Lo sentimos, la página que estás buscando no existe o ha sido movida a otro lugar.
    </p>
    
    <div class="actions">
      <a routerLink="/dashboard" class="btn-primary">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Volver al Inicio
      </a>
      <button (click)="goBack()" class="btn-secondary">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Página Anterior
      </button>
    </div>
    
    <div class="suggestions">
      <h3>¿Buscas algo más?</h3>
      <div class="suggestion-links">
        <a routerLink="/inventario">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          </svg>
          Inventario
        </a>
        <a routerLink="/ventas">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
          Ventas
        </a>
        <a routerLink="/clientes">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          Clientes
        </a>
        <a routerLink="/proveedores">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
          </svg>
          Proveedores
        </a>
      </div>
    </div>
  </div>
</div>
