<!-- Modal profesional para cambiar contraseña -->
<div class="modal-overlay show">
  <div class="modal-box">
    <div class="modal-header">
      <h2><i class="fa-solid fa-lock"></i> Cambiar Contraseña</h2>
      <button class="modal-close" (click)="cerrarModal()">&times;</button>
    </div>
    <form class="modal-form">
      <div class="form-group">
        <label for="actual">Contraseña Actual <span>*</span></label>
        <input type="password" id="actual" name="actual" [(ngModel)]="passwordActual" required>
      </div>
      <div class="form-group">
        <label for="nueva">Contraseña Nueva <span>*</span></label>
        <input type="password" id="nueva" name="nueva" [(ngModel)]="passwordNueva" required>
      </div>
      <div class="form-group">
        <label for="confirmar">Confirmar Contraseña <span>*</span></label>
        <input type="password" id="confirmar" name="confirmar" [(ngModel)]="passwordConfirmar" required>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-cancel" (click)="cerrarModal()">Cancelar</button>
        <button type="submit" class="btn-primary" (click)="cambiarContrasena()">Cambiar Contraseña</button>
      </div>
    </form>
  </div>
</div>
